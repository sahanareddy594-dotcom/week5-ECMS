<!DOCTYPE html>
<html>
<head>
    <title>Materials</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .main {
            margin-left: 220px;
            padding: 20px;
        }

        form {
            margin-bottom: 15px;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 12px;
            background: #ff9800;
            color: white;
            border: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #333;
            color: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        /* STOCK COLORS */
        .low {
            color: red;
            font-weight: bold;
        }

        .ok {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>ECMS</h2>
    <a href="/">🏠 Dashboard</a>
    <a href="/electricians">👷 Electricians</a>
    <a href="/jobs">💼 Jobs</a>
    <a href="/tasks">📋 Tasks</a>
    <a href="/materials">🧱 Materials</a>
    <a href="/reports">📊 Reports</a>
</div>

<!-- MAIN -->
<div class="main">
    <h2>🧱 Materials Management</h2>

    
<form method="POST">
    <input type="text" name="name" placeholder="Material Name" required>
    <input type="number" name="quantity" placeholder="Quantity" required>
    <input type="number" name="cost" placeholder="Cost" required>
    <button type="submit">Add Material</button>
</form>

<br>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Quantity</th>
        <th>Cost</th>
    </tr>

    {% for m in data %}
    <tr>
        <td>{{ m.id }}</td>
        <td>{{ m.name }}</td>
        <td>{{ m.quantity }}</td>
        <td>{{ m.cost }}</td>
    </tr>
    {% endfor %}

</table>
</body>


</html>
