<!DOCTYPE html>
<html>
<head>
    <title>Electricians</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .main {
            margin-left: 220px;
            padding: 20px;
        }

        form {
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 12px;
            background: #007bff;
            color: white;
            border: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #333;
            color: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>ECMS</h2>
    <a href="/">🏠 Dashboard</a>
    <a href="/electricians">👷 Electricians</a>
    <a href="/jobs">💼 Jobs</a>
    <a href="/tasks">📋 Tasks</a>
    <a href="/materials">🧱 Materials</a>
    <a href="/reports">📊 Reports</a>
</div>

<div class="main">
    <h2>Electricians</h2>
    

    <!-- FORM -->
    <form method="POST">
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="phone" placeholder="Phone" required>
        <input type="text" name="experience" placeholder="Experience" required>
        <button>Add</button>
    </form>

    <!-- TABLE -->
    <table>
        <tr>
            <th>Profile</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Experience</th>
        </tr>

        {% for e in data %}
        <tr>
            <td>
                <img class="profile-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            </td>
            <td>{{ e.name }}</td>
            <td>{{ e.phone }}</td>
            <td>{{ e.experience }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
